<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ head.title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        {% block style %}
        {% endblock %}
    </style>
</head>
<body>
    <header>
        {% include './include/menu.html' %}
        {% block header %}
        {% endblock header %}
    </header>

    <main>
        {% block main %}
        {% endblock main %}
    </main>

    <footer>
        <div class="container-fluid" style="background-color: #e3f2fd;" data-bs-theme="light">
            <div class="container">
            {% block footer %}
            {% endblock footer %}
            </div>
            <p>&copy; MDM. Подсистма RDM. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
