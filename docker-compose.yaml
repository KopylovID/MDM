services:

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d/
      - pg_data:/var/lib/postgresql/18/docker
    ports:
      - "${PG_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}" ]
      interval: 10s      # как часто проверять
      timeout: 5s        # таймаут проверки
      retries: 5         # количество попыток до признания unhealthy
      start_period: 10s  # время, которое нужно подождать перед первой проверкой

volumes:
  pg_data: