{% extends 'core/base.html' %}

{% block title %} Вход {% endblock %}

{% block main %}
    <h4>Вход в личный кабинет</h4>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p class="mt-3">
        <a href="{% url 'ua:register' %}" class="btn btn-secondary mt-3">Зарегистрироваться</a>
        <a href="{% url 'ma:index' %}" class="btn btn-secondary mt-3">Главная страница</a>
    </p>
{% endblock main %}
