{% extends 'core/base.html' %}

{% block title %} Выход {% endblock %}

{% block main %}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
            <h4>Вы вышли из аккаунта</h4>
            <form method="post" class="mt-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <p class="mt-3">
                <a href="{% url 'ua:login' %}" class="btn btn-primary mt-3">Войти</a>
                <a href="{% url 'ma:index' %}" class="btn btn-secondary mt-3">Главная страница</a>
            </p>
            </div>
        </div>
    </div>
{% endblock main %}
